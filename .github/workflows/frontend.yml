name: Frontend CI

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
  pull_request:
    branches: ["main"]
    paths:
      - "frontend/**"

jobs:
  frontend-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Linting
        run: npm run lint

      - name: Prettier Check
        run: npx prettier --check .

      - name: Build Check
        run: npm run build

      - name: Check FSD Architecture
        run: npm run fsd

      - name: i18next
        run: npm run lang -- extract --ci && npm run lang -- lint

      # - name: Check Dead Code
      #   run: npm run knip

      - name: Security Audit
        run: npm audit --audit-level=high --omit=dev
